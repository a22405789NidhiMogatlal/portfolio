{% extends "portfolio/base.html" %}

{% block content %}
<h2> Competências</h2>

<a href="{% url 'competencia_novo' %}"><button>Criar Competência</button></a>

<ul>
    {% for c in competencias %}
        <li>
            <a href="{% url 'competencia' c.id %}">
                {{ c.nome }}
            </a>
        </li>
    {% endfor %}
</ul>
{% endblock %}

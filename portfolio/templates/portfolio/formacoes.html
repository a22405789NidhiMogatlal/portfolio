{% extends "portfolio/base.html" %}

{% block content %}
<h2> Formação</h2>

<a href="{% url 'formacao_novo' %}"><button>Adicionar Formação</button></a>

<section>
    {% for f in formacoes %}
    <article>
        <a href="{% url 'formacao' f.id %}">
                {{ f.titulo }}
            </a>
        <p>{{ f.instituicao }}</p>
        
        <p>{{ f.data_inicio }} → {{ f.data_conclusao }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}

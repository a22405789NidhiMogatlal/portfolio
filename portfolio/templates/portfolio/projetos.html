{% extends "portfolio/base.html" %}

{% block content %}

<h2> Projetos </h2>

<a href="{% url 'projeto_novos' %}"><button>Criar novo projeto</button></a>

<ul>
    {% for projeto in projetos %}
        <li>
            <a href="{% url 'projeto' projeto.id %}">
                {{ projeto.titulo }}
            </a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
